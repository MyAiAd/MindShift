name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 77.42.72.2
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 10m
          script_stop: true
          script: |
            cd /opt/mind-shift/app
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            bash scripts/deploy-hetzner.sh
