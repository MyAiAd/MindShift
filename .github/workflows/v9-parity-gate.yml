name: V2 vs V9 Parity Gate

# V9 is a voice adapter around V2's state machine. Every push MUST prove
# V9 has not drifted from V2. This gate runs the standalone (no-server)
# direct-parity check, so it works in forks, PRs, and in CI without needing
# auth credentials or a live server.
#
# See /.cursor/plans/v9_voice_clone_plan_b3f48b14.plan.md for rationale.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  v2-v9-direct-parity:
    name: V2 vs V9 direct parity (no allowlist)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Run V2 vs V9 direct parity gate
        run: npm run ci:v9-gate

      - name: Run V9 theme-token gate
        run: npm run ci:v9-theme-gate

      - name: Run V9 frontend unit tests
        run: npm run ci:v9-unit

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2-v9-parity-report
          path: tests/reports/V2_V9_PARITY_REPORT.md
          if-no-files-found: warn

  v9-visual-regression:
    name: V9 visual-regression screenshots
    runs-on: ubuntu-latest
    needs: v2-v9-direct-parity
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run V9 visual-regression tests
        run: npm run test:v9-visual

      - name: Upload visual diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: v9-visual-diffs
          path: |
            tests/v9/visual-regression.spec.ts-snapshots/
            test-results/
          if-no-files-found: warn
